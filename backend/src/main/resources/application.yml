spring:
  application:
    name: miioo-backend
  datasource:
    url: jdbc:mysql://localhost:3306/miioo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: miioo
    password: miioo
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

miioo:
  jwt:
    secret: replace-with-env-secret-change-me
    expire-seconds: 86400
  auth:
    return-code-in-response: false
  ai:
    mode: mock
