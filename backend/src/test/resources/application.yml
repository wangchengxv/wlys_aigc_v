spring:
  datasource:
    url: jdbc:h2:mem:miioo;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  sql:
    init:
      mode: always
  data:
    redis:
      host: localhost
      port: 6379

miioo:
  jwt:
    secret: test-secret-for-jwt-32-bytes-value
    expire-seconds: 3600
  auth:
    return-code-in-response: true
  ai:
    mode: mock
