server:
  port: 8080

spring:
  application:
    name: aigc-server
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:aigc_manju}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:rootroot}
    driver-class-name: com.mysql.cj.jdbc.Driver
  # datasource:
  #   url: jdbc:mysql://${DB_HOST:115.190.243.55}:${DB_PORT:3306}/${DB_NAME:aigc}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
  #   username: ${DB_USER:aigc}
  #   password: ${DB_PASSWORD:rootroot}
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

aigc:
  cors:
    # Override with AIGC_CORS_ALLOWED_ORIGIN_PATTERNS=comma-separated list on the server if needed.
    allowed-origin-patterns: ${AIGC_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://152.136.237.31:*,http://chengxvblog.top,https://chengxvblog.top,http://chengxvblog.top:*,https://chengxvblog.top:*}
  storage:
    data-dir: ${AIGC_DATA_DIR:${user.home}/.aigcmanju}
    provider: ${AIGC_STORAGE_PROVIDER:LOCAL}
    local-bucket: ${AIGC_STORAGE_LOCAL_BUCKET:aigc-local}
  auth:
    access-token: ${AIGC_ACCESS_TOKEN:dev-local-token}
    user-id-required: ${AIGC_USER_ID_REQUIRED:true}
    development-headers-enabled: ${AIGC_DEVELOPMENT_HEADERS_ENABLED:true}
    jwt-secret: ${AIGC_JWT_SECRET:change-this-jwt-secret-change-this-jwt-secret}
    jwt-issuer: ${AIGC_JWT_ISSUER:aigc-server}
    jwt-expire-minutes: ${AIGC_JWT_EXPIRE_MINUTES:720}
    login-failure-threshold: ${AIGC_LOGIN_FAILURE_THRESHOLD:5}
    lock-duration-minutes: ${AIGC_LOCK_DURATION_MINUTES:30}
    force-password-change-on-reset: ${AIGC_FORCE_PASSWORD_CHANGE_ON_RESET:false}
    social:
      onelinkai:
        enabled: ${AIGC_AUTH_SOCIAL_ONELINKAI_ENABLED:true}
        client-id: ${AIGC_AUTH_SOCIAL_ONELINKAI_CLIENT_ID:}
        client-secret: ${AIGC_AUTH_SOCIAL_ONELINKAI_CLIENT_SECRET:}
        authorize-uri: ${AIGC_AUTH_SOCIAL_ONELINKAI_AUTHORIZE_URI:https://open.onelinkai.com/oauth/authorize}
        token-uri: ${AIGC_AUTH_SOCIAL_ONELINKAI_TOKEN_URI:https://open.onelinkai.com/oauth/token}
        user-info-uri: ${AIGC_AUTH_SOCIAL_ONELINKAI_USER_INFO_URI:https://open.onelinkai.com/oauth/userinfo}
        redirect-uri: ${AIGC_AUTH_SOCIAL_ONELINKAI_REDIRECT_URI:http://localhost:5173/social/callback/onelinkai}
        scope: ${AIGC_AUTH_SOCIAL_ONELINKAI_SCOPE:openid profile}
      wechat:
        enabled: ${AIGC_AUTH_SOCIAL_WECHAT_ENABLED:false}
        app-id: ${AIGC_AUTH_SOCIAL_WECHAT_APP_ID:}
        app-secret: ${AIGC_AUTH_SOCIAL_WECHAT_APP_SECRET:}
        authorize-uri: ${AIGC_AUTH_SOCIAL_WECHAT_AUTHORIZE_URI:https://open.weixin.qq.com/connect/qrconnect}
        token-uri: ${AIGC_AUTH_SOCIAL_WECHAT_TOKEN_URI:https://api.weixin.qq.com/sns/oauth2/access_token}
        user-info-uri: ${AIGC_AUTH_SOCIAL_WECHAT_USER_INFO_URI:https://api.weixin.qq.com/sns/userinfo}
        redirect-uri: ${AIGC_AUTH_SOCIAL_WECHAT_REDIRECT_URI:http://localhost:5173/social/callback/wechat}
        scope: ${AIGC_AUTH_SOCIAL_WECHAT_SCOPE:snsapi_login}
    seed-users:
      - user-id: admin-001
        username: admin
        password: ${AIGC_SEED_ADMIN_PASSWORD:Admin@123}
        display-name: 平台管理员
        role: ADMIN
        org-unit-id: platform
        enabled: true
      - user-id: teacher-001
        username: teacher
        password: ${AIGC_SEED_TEACHER_PASSWORD:Teacher@123}
        display-name: 张老师
        role: TEACHER
        org-unit-id: film-school
        enabled: true
      - user-id: student-001
        username: student
        password: ${AIGC_SEED_STUDENT_PASSWORD:Student@123}
        display-name: 李同学
        role: STUDENT
        org-unit-id: film-school
        classroom-id: film-school-class-1
        enabled: true
  pipeline:
    video:
      max-parallel: 3
      poll-interval-ms: 3000
      max-retries: 2
  security:
    encryption-key: ${ENCRYPTION_KEY:default-encryption-key-change-in-production}
  onelinkai:
    enabled: ${AIGC_ONELINKAI_ENABLED:true}
    base-url: ${AIGC_ONELINKAI_BASE_URL:https://api.onelinkai.cloud}
    model-list:
      remote-enabled: ${AIGC_ONELINKAI_MODEL_LIST_REMOTE_ENABLED:true}
      timeout-ms: ${AIGC_ONELINKAI_MODEL_LIST_TIMEOUT_MS:8000}
      fallback-static: ${AIGC_ONELINKAI_MODEL_LIST_FALLBACK_STATIC:true}
  comfy:
    base-url: ${AIGC_COMFY_BASE_URL:http://127.0.0.1:8188}
  ark:
    base-url: https://ark.cn-beijing.volces.com
    api-key: ${ARK_API_KEY:}
    default-image-model: doubao-seedream-5-0-260128
    default-video-model: doubao-seedance-1-5-pro-251215
    video-api-path: /api/v3/contents/generations/tasks
    video-result-api-path: /api/v3/contents/generations/tasks/{taskId}
    video-poll-max-attempts: 200
    video-poll-interval-ms: 3000
    video-duration-seconds: 5
    image-model-options:
      - doubao-seedream-5-0-260128
    video-model-options:
      - doubao-seedance-1-5-pro-251215
    response-format: url
    size: 2K
    stream: false
    watermark: true
    sequential-image-generation: disabled

management:
  endpoints:
    web:
      exposure:
        include: health,info
